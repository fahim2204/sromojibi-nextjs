name: Deploy ezcalc.xyz to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_KEY }}

      - name: Prepare standalone build
        run: |
          mkdir -p .next/standalone/.next/static
          mkdir -p .next/standalone/public
          cp -r .next/static/* .next/standalone/.next/static/
          cp -r public/* .next/standalone/public/
          
      - name: Deploy build artifacts to VPS
        env:
          RSYNC_RSH: "ssh -T -o StrictHostKeyChecking=no -o LogLevel=ERROR"
        run: |
          rsync -avz --delete \
            --exclude '.env' \
            .next/standalone/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/

      - name: Restart application on VPS
        run: |
          ssh -T -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd ${{ secrets.VPS_PATH }} && \
            pm2 stop ezcalc || true && \
            pm2 delete ezcalc || true && \
            PORT=3001 NODE_ENV=production pm2 start server.js --name ezcalc && \
            pm2 save"
