name: Deploy ezcalc.xyz to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_KEY }}

      - name: Prepare static export
        run: |
          # Next.js "output: export" generates the "out" directory by default
          if [ ! -d "out" ]; then
            echo "Error: 'out' directory not found. Make sure 'output: export' is set in next.config.js"
            exit 1
          fi
          
          # Verify sitemap.xml was generated
          if [ ! -f "out/sitemap.xml" ]; then
            echo "Error: 'out/sitemap.xml' not found. Sitemap generation failed."
            exit 1
          fi
          echo "✓ sitemap.xml found in out directory"
      - name: Deploy build artifacts to VPS
        env:
          RSYNC_RSH: "ssh -T -o StrictHostKeyChecking=no -o LogLevel=ERROR"
        run: |
          rsync -avz --delete \
            --chmod=Du=rwx,Dgo=rx,Fu=rw,Fgo=r \
            --exclude '.env' \
            out/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/public_html/

      # PM2 restart is not needed for static site deployment

